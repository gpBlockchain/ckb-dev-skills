name: Docs Checks

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            --config .lychee.toml
            --no-progress
            README.md
            skill/
          fail: true

  markdown-format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Markdown formatting
        run: npx --yes prettier@3.5.3 --check README.md skill/*.md

  spelling:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check spelling
        run: npx --yes cspell@8.17.5 lint --config .cspell.json README.md skill/*.md
